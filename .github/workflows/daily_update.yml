name: CME Daily Download to Notion

on:
  schedule:
    # 每天 UTC 时间凌晨 2:00 运行 (北京/台北时间上午 10:00)
    - cron: '0 2 * * *' 
  workflow_dispatch: # 这个选项允许你随时在网页上手动点击运行测试

permissions:
  contents: write # 必须要有写入权限，脚本才能把下载的文件存进你的仓库

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 notion-client

      - name: Run Python Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py

      # ===== 修改了这里：使用统一且更稳定的自动提交插件 =====
      - name: Commit and push downloaded file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-download CME daily report"
          file_pattern: "downloads/*"
