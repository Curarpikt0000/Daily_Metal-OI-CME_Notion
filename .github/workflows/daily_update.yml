name: CME Daily Download to Notion

on:
  schedule:
    # 每天 UTC 时间凌晨 2:00 运行 (北京/台北时间上午 10:00)
    # 你可以根据 CME 实际更新的时间修改这个 cron 表达式
    - cron: '0 2 * * *' 
  workflow_dispatch: # 这个选项允许你随时在网页上手动点击运行测试

permissions:
  contents: write # 必须要有写入权限，脚本才能把下载的文件存进你的仓库

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 notion-client

      - name: Run Python Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py

      - name: Commit and Push downloaded file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add downloads/
          # 如果周末没有新文件，commit 会报错，加上 || echo 忽略报错继续执行
          git commit -m "Auto-download CME daily report" || echo "No changes to commit"
          git push
