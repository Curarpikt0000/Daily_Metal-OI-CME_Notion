name: CME Daily Download to Notion

on:
  schedule:
    # 每天 UTC 2:00 (北京 10:00 / 东京 11:00) 运行
    - cron: '0 2 * * *' 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 升级到 v4 获得更好性能

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 notion-client

      - name: Run Python Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }} # 必须传入这个，否则脚本无法生成 Raw 链接
        run: python main.py

      - name: Commit and push downloaded files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-download CME Metals (Futures & Options) reports"
          file_pattern: "downloads/*" # 这里会匹配所有下载的文件并上传
