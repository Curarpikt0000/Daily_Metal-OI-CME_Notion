name: CME Daily Download to Notion

on:
  schedule:
    # 每天 UTC 时间凌晨 2:00 运行 (东京时间上午 11:00)
    - cron: '0 2 * * *' 
  workflow_dispatch: # 允许手动点击运行

permissions:
  contents: write # 必须要有写入权限，用于提交下载的文件

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 注意：这里新增了 cloudscraper 以绕过 403 拦截
          pip install requests beautifulsoup4 notion-client cloudscraper

      - name: Run Python Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py

      - name: Commit and push downloaded files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-download CME Metals (Futures & Options) reports"
          file_pattern: "downloads/*"
